<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Places Map | Vozmezdie</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Stardos+Stencil:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Crimson Text', Georgia, serif; background: #f5f0e6; color: #4a5568; }
    .demo-header { padding: 1rem 1.5rem; background: #2d3748; color: #e8e4dc; border-bottom: 1px solid rgba(139,0,0,0.3); }
    .demo-header h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    .demo-header p { margin: 0.5rem 0 0; font-size: 0.9rem; opacity: 0.9; }
    .demo-header .demo-header-tagline { margin: 0.35rem 0 0; font-size: 0.82rem; opacity: 0.85; font-style: italic; }
    #map { height: calc(100vh - 100px); min-height: 400px; }
    .leaflet-popup-content { margin: 0.5rem 0.75rem; font-family: 'Crimson Text', Georgia, serif; font-size: 0.9rem; max-width: 320px; max-height: 70vh; overflow-y: auto; }
    .leaflet-popup-content strong { color: #8b0000; }
    .leaflet-popup-content details { margin-top: 0.5rem; }
    .leaflet-popup-content details summary { cursor: pointer; font-weight: 600; color: #4a5568; }
    .leaflet-popup-content ul { margin: 0.25rem 0 0 1rem; padding: 0; }
    .leaflet-popup-content li { margin-bottom: 0.25rem; }
    .leaflet-popup-content .popup-historical { font-style: italic; color: #6b7280; margin-top: 0.5rem; font-size: 0.85rem; }
    .leaflet-popup-content .popup-doc-link,
    .leaflet-popup-content .popup-doc-view-btn { color: #8b0000; text-decoration: none; font-weight: 600; white-space: nowrap; font-family: inherit; font-size: inherit; }
    .leaflet-popup-content .popup-doc-link:hover,
    .leaflet-popup-content .popup-doc-view-btn:hover { text-decoration: underline; }
    .leaflet-popup-content .popup-doc-view-btn { background: none; border: none; padding: 0; cursor: pointer; }
    .leaflet-popup-content .popup-segments-table { width: 100%; border-collapse: collapse; margin-top: 0.25rem; font-size: 0.85rem; }
    .leaflet-popup-content .popup-segments-table th { text-align: left; padding: 0.2rem 0.4rem; border-bottom: 1px solid #c4b5a0; color: #4a5568; }
    .leaflet-popup-content .popup-segments-table td { padding: 0.25rem 0.4rem; border-bottom: 1px solid #e8e4dc; vertical-align: top; }
    .leaflet-popup-content .popup-segments-table .segment-text { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .eye-marker { background: transparent; border: none; }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1>Places Map</h1>
    <p class="demo-header-tagline">The eyes of the KGB are upon you.</p>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    (function() {
      var places = [{"name": "Ukraine", "count": 5, "coords": [48.3794, 31.1656], "segments": [{"eng": "on the temporarily Hitlerites-occupied territory of Ukraine", "rus": "на временно оккупированной гитлеровцами территории Украины", "doc_id": "1127", "row_index": 5}, {"eng": "in the Ukraine", "rus": "на Украине", "doc_id": "1127", "row_index": 22}, {"eng": "in the Ukraine", "rus": "на Украине", "doc_id": "1256", "row_index": 31}, {"eng": "in the Ukraine", "rus": "на Украине", "doc_id": "1262_149-150", "row_index": 11}, {"eng": "in the Ukraine", "rus": "на Украине", "doc_id": "1262_198-200", "row_index": 9}], "doc_counts": [{"doc_id": "1127", "display_name": "Memorandum, Dec 1976: discrediting OUN abroad", "count": 2}, {"doc_id": "1256", "display_name": "Letter, Sep 1987: anthology \"Sami pro sebe\"", "count": 1}, {"doc_id": "1262_149-150", "display_name": "Bulletin, Apr 1988: Chernobyl; OUN leaflet at UN", "count": 1}, {"doc_id": "1262_198-200", "display_name": "Memorandum, May 1988: OUN and the Reagan summit", "count": 1}], "historical": null, "report": "index.html"}, {"name": "Khmelnytskyi", "count": 1, "coords": [49.4228, 26.9871], "segments": [{"eng": "the Khmelnytskyi Regional Committee", "rus": "Хмельницкому", "doc_id": "1127", "row_index": 64}], "doc_counts": [{"doc_id": "1127", "display_name": "Memorandum, Dec 1976: discrediting OUN abroad", "count": 1}], "historical": null, "report": "index.html"}, {"name": "Vinnytsia", "count": 1, "coords": [49.2328, 28.4681], "segments": [{"eng": "the Vinnytsia Regional Committee", "rus": "Винницкому", "doc_id": "1127", "row_index": 65}], "doc_counts": [{"doc_id": "1127", "display_name": "Memorandum, Dec 1976: discrediting OUN abroad", "count": 1}], "historical": null, "report": "index.html"}, {"name": "Zhytomyr", "count": 1, "coords": [50.2547, 28.6587], "segments": [{"eng": "and the Zhytomyr Regional Committee", "rus": "и Житомирскому", "doc_id": "1127", "row_index": 66}], "doc_counts": [{"doc_id": "1127", "display_name": "Memorandum, Dec 1976: discrediting OUN abroad", "count": 1}], "historical": null, "report": "index.html"}, {"name": "Kyiv", "count": 1, "coords": [50.4501, 30.5234], "segments": [{"eng": "of the Kyiv District KGB Office", "rus": "Киевского райотдела КГБ", "doc_id": "1127", "row_index": 70}], "doc_counts": [{"doc_id": "1127", "display_name": "Memorandum, Dec 1976: discrediting OUN abroad", "count": 1}], "historical": "Kiev (pre-1991)", "report": "index.html"}, {"name": "Kharkiv", "count": 1, "coords": [49.9935, 36.2304], "segments": [{"eng": "of the Kharkiv garrison", "rus": "Харьковского гарнизона", "doc_id": "1127", "row_index": 78}], "doc_counts": [{"doc_id": "1127", "display_name": "Memorandum, Dec 1976: discrediting OUN abroad", "count": 1}], "historical": null, "report": "index.html"}, {"name": "Soviet Union", "count": 1, "coords": [55.7558, 37.6173], "segments": [{"eng": "outside the building of the Permanent Mission of the USSR to the United Nations", "rus": "у здания Постоянного представительства СССР при ООН", "doc_id": "1215", "row_index": 13}], "doc_counts": [{"doc_id": "1215", "display_name": "Bulletin, Jan 1984: foreign nationals in UkrSSR", "count": 1}], "historical": null, "report": "index.html"}];
      var reportFile = places[0] && places[0].report ? places[0].report : 'manual_analysis_report.html';
      var useEmbedded = false;
      var hostDocId = null;
      function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      function placesMapLabHost() {
        var cur = window;
        for (var depth = 0; depth < 10; depth++) {
          try {
            if (cur.placesMapNavigateToSegment && typeof cur.placesMapNavigateToSegment === 'function') return cur;
          } catch (e) {}
          if (!cur.parent || cur.parent === cur) break;
          cur = cur.parent;
        }
        try {
          if (window.top && window.top !== window && window.top.placesMapNavigateToSegment) return window.top;
        } catch (e2) {}
        return (window.parent && window.parent !== window) ? window.parent : null;
      }
      function placesMapSendNavigate(docId, rowIdx, eng, rus) {
        try { if (typeof map !== 'undefined' && map && map.closePopup) map.closePopup(); } catch (e) {}
        var navDocId = (hostDocId && useEmbedded) ? hostDocId : docId;
        if (!navDocId) return;
        var host = placesMapLabHost();
        if (host && typeof host.placesMapNavigateToSegment === 'function') {
          host.placesMapNavigateToSegment(navDocId, rowIdx, eng, rus, hostDocId);
          return;
        }
        if (useEmbedded && navDocId && rowIdx >= 0 && host) {
          try { host.location.hash = '#tab-' + navDocId + '-row-' + rowIdx; } catch (e3) {}
          return;
        }
        try {
          var target = host || window.parent;
          if (target && target !== window) {
            target.postMessage({ type: 'places-map-navigate', docId: navDocId, rowIndex: rowIdx, entryEng: eng || '', entryRus: rus || '', hostDocId: hostDocId || '' }, '*');
          }
        } catch (e4) {}
      }
      function placesMapViewClick(anchor) {
        if (!anchor) return false;
        var docId = anchor.getAttribute('data-doc-id') || '';
        var rowIdx = parseInt(anchor.getAttribute('data-row-index'), 10);
        if (isNaN(rowIdx)) rowIdx = -1;
        var eng = anchor.getAttribute('data-entry-eng') || '';
        var rus = anchor.getAttribute('data-entry-rus') || '';
        placesMapSendNavigate(docId, rowIdx, eng, rus);
        return false;
      }
      function placesMapBindPopupViewButtons(popupEl) {
        if (!popupEl) return;
        popupEl.querySelectorAll('.popup-doc-view-btn, .popup-doc-link').forEach(function(btn) {
          if (btn.getAttribute('data-places-view-bound') === '1') return;
          btn.setAttribute('data-places-view-bound', '1');
          btn.addEventListener('click', function(ev) {
            ev.preventDefault();
            placesMapViewClick(btn);
          });
        });
      }
      window.placesMapViewClick = placesMapViewClick;
      function popupHtml(p) {
        var h = '<strong>' + esc(p.name) + '</strong><br/>' + p.count + ' segment(s)';
        if (p.segments && p.segments.length > 0) {
          h += '<details><summary>Segments mentioning this place</summary>';
          h += '<table class="popup-segments-table"><thead><tr><th>Segment</th><th>Document</th><th></th></tr></thead><tbody>';
          p.segments.forEach(function(s) {
            var eng = esc(s.eng), rus = esc(s.rus), docId = s.doc_id || '', rowIdx = s.row_index;
            var text = (eng || rus) + (eng && rus ? ' / ' + rus : '');
            var docName = (p.doc_counts || []).find(function(d) { return d.doc_id === docId; });
            docName = docName ? esc(docName.display_name) : esc(docId);
            var link = '';
            if (docId && (!hostDocId || docId === hostDocId)) {
              var attrs = ' data-doc-id="' + esc(docId) + '" data-row-index="' + rowIdx
                + '" data-entry-eng="' + esc(s.eng || '') + '" data-entry-rus="' + esc(s.rus || '') + '"'
                + ' onclick="return placesMapViewClick(this);"';
              if (useEmbedded) {
                link = '<button type="button" class="popup-doc-view-btn"' + attrs + '>View</button>';
              } else {
                var href = esc(reportFile) + '#tab-' + esc(docId) + '-row-' + rowIdx;
                link = '<a class="popup-doc-link" href="' + href + '" target="_blank" rel="noopener"' + attrs + '>View</a>';
              }
            }
            h += '<tr><td class="segment-text" title="' + text + '">' + text + '</td><td>' + docName + '</td><td>' + link + '</td></tr>';
          });
          h += '</tbody></table></details>';
        }
        if (p.doc_counts && p.doc_counts.length > 0) {
          h += '<details><summary>By document</summary><ul>';
          p.doc_counts.forEach(function(d) {
            h += '<li>' + esc(d.display_name) + ': ' + d.count + '</li>';
          });
          h += '</ul></details>';
        }
        if (p.historical) {
          h += '<p class="popup-historical">Historical: ' + esc(p.historical) + ' (Soviet era)</p>';
        }
        return h;
      }
      var counts = places.map(function(p) { return p.count; });
      var minCount = Math.min.apply(null, counts);
      var maxCount = Math.max.apply(null, counts);
      function sizeForCount(c) { return 12 + Math.sqrt((c - minCount) / (maxCount - minCount || 1)) * 36; }
      function eyeSvg(size) {
        var s = Math.round(size);
        return '<svg viewBox="0 0 24 24" width="' + s + '" height="' + s + '" class="eye-marker"><ellipse cx="12" cy="12" rx="10" ry="6" fill="#8b0000" stroke="#4a0000" stroke-width="1"/><ellipse cx="12" cy="12" rx="4" ry="3" fill="#1a0000"/><circle cx="13" cy="11" r="1" fill="rgba(255,255,255,0.4)"/></svg>';
      }
      var map = L.map('map').setView([48.5, 31.5], 6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>', maxZoom: 20, subdomains: 'abcd' }).addTo(map);
      map.on('popupopen', function(ev) {
        var popupEl = ev.popup && ev.popup.getElement ? ev.popup.getElement() : null;
        placesMapBindPopupViewButtons(popupEl);
      });
      places.forEach(function(p) {
        var sz = sizeForCount(p.count);
        var icon = L.divIcon({ html: eyeSvg(sz), className: 'eye-marker', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2] });
        L.marker([p.coords[0], p.coords[1]], { icon: icon }).addTo(map).bindPopup(popupHtml(p));
      });
    })();
  </script>
</body>
</html>
